name: Daily Warehance Sync

on:
  schedule:
    - cron: '1 8 * * *'  # 00:01 PST (08:01 UTC)
  workflow_dispatch:
    inputs:
      client:
        description: 'Client number (e.g. 111). Leave empty for all clients.'
        required: false
        default: ''
      days:
        description: 'Days back to sync'
        required: false
        default: '1'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_SA_KEY }}' > config/service_account.json

      - name: Run sync
        env:
          WAREHANCE_API_KEY: ${{ secrets.WAREHANCE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS="--days ${{ github.event.inputs.days || '1' }}"
          if [ -n "${{ github.event.inputs.client }}" ]; then
            ARGS="$ARGS --client ${{ github.event.inputs.client }}"
          fi
          python3 agent.py $ARGS
