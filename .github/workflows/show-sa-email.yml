name: Show SA Email

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Write SA key
        run: |
          echo '${{ secrets.GOOGLE_SA_KEY }}' > /tmp/sa.json

      - name: Show email
        run: |
          python3 -c "import json; d=json.load(open('/tmp/sa.json')); print('SA_EMAIL=' + d.get('client_email','NOT_FOUND'))"
