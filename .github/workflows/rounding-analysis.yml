name: Rounding Analysis

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rounding analysis
        env:
          WAREHANCE_API_KEY: ${{ secrets.WAREHANCE_API_KEY }}
        run: |
          cat > rounding_analysis.py << 'SCRIPT'
          #!/usr/bin/env python3
          """
          Rounding Analysis — compare Warehance bill totals with our transformer output.
          Tests multiple clients on a recent date.
          """
          import csv
          import io
          import json
          import os
          import sys
          import time
          import requests
          from decimal import Decimal, ROUND_HALF_UP
          from pathlib import Path

          sys.path.insert(0, str(Path(__file__).parent))
          from transformer import transform_bill_details, _safe_float

          API_KEY = os.environ.get("WAREHANCE_API_KEY", "")
          BASE_URL = "https://api.warehance.com/v1"

          def api_headers():
              return {"X-API-Key": API_KEY, "Content-Type": "application/json"}

          def create_bill(client_id, billing_profile_id, start_date, end_date):
              r = requests.post(f"{BASE_URL}/bills", headers=api_headers(), json={
                  "client_id": client_id,
                  "billing_profile_id": billing_profile_id,
                  "start_date": start_date,
                  "end_date": end_date,
              }, timeout=30)
              r.raise_for_status()
              data = r.json()["data"]
              print(f"Created bill: {data['id']}")
              return data

          def wait_for_bill(bill_id, max_attempts=30):
              h = {"X-API-Key": API_KEY}
              for i in range(max_attempts):
                  r = requests.get(f"{BASE_URL}/bills/{bill_id}", headers=h, timeout=30)
                  data = r.json()["data"]
                  status = data.get("generation_status", "")
                  csv_url = data.get("line_item_details_csv_url", "")
                  if csv_url and status == "Completed":
                      print(f"Bill ready after {i+1} attempts")
                      return data
                  time.sleep(3)
              raise TimeoutError(f"Bill {bill_id} not ready after {max_attempts} attempts")

          def download_csv(csv_url):
              r = requests.get(csv_url, timeout=60)
              r.raise_for_status()
              reader = csv.DictReader(io.StringIO(r.text))
              rows = list(reader)
              return rows, r.text

          def analyze_rounding(raw_rows, bill_data, client_name="", client_number=""):
              print("\n" + "="*80)
              print(f"ROUNDING ANALYSIS: {client_number} {client_name}")
              print("="*80)

              print(f"\n--- RAW CSV: {len(raw_rows)} rows ---")
              if raw_rows:
                  print(f"Columns: {list(raw_rows[0].keys())}")

              for i, row in enumerate(raw_rows[:5]):
                  print(f"  Row {i}: Category={row.get('Charge Type Category','?')}, "
                        f"Amount={row.get('Amount','?')}, "
                        f"Order={row.get('Order Number','?')}, "
                        f"Rule={row.get('Charge Rule Name','?')[:40]}")
              if len(raw_rows) > 5:
                  print(f"  ... ({len(raw_rows) - 5} more rows)")

              # Warehance bill summary
              print(f"\n--- WAREHANCE BILL SUMMARY ---")
              bill_total = bill_data.get("total_amount")
              bill_subtotal = bill_data.get("subtotal_amount")
              print(f"  Bill total (from API): {bill_total}")
              print(f"  Bill subtotal (from API): {bill_subtotal}")

              line_items = bill_data.get("line_items", [])
              if line_items:
                  print(f"  Line items summary ({len(line_items)} categories):")
                  for li in line_items:
                      print(f"    {li.get('name','?')}: ${li.get('total_amount','?')} "
                            f"(qty: {li.get('quantity','?')})")

              # Sum methods
              csv_float_total = sum(_safe_float(row.get("Amount", "0")) for row in raw_rows)

              csv_decimal_total = Decimal("0")
              for row in raw_rows:
                  amt_str = str(row.get("Amount", "0")).strip().replace(",", ".")
                  if amt_str:
                      try:
                          csv_decimal_total += Decimal(amt_str)
                      except:
                          pass

              csv_round_each_total = sum(round(_safe_float(row.get("Amount", "0")), 2) for row in raw_rows)

              print(f"\n--- CSV TOTALS (different methods) ---")
              print(f"  Float sum:             ${csv_float_total:.6f}  (rounded: ${round(csv_float_total, 2):.2f})")
              print(f"  Decimal sum:           ${csv_decimal_total}  (rounded: ${csv_decimal_total.quantize(Decimal('0.01'), rounding=ROUND_HALF_UP)})")
              print(f"  Round-each-then-sum:   ${csv_round_each_total:.6f}  (rounded: ${round(csv_round_each_total, 2):.2f})")

              # Our transformer
              result = transform_bill_details(raw_rows, client_name=client_name, client_number=client_number)
              our_total = result["grand_total"]

              print(f"\n--- OUR TRANSFORMER OUTPUT ---")
              print(f"  grand_total: ${our_total:.2f}")
              print(f"  Category totals: {result['category_totals']}")

              # Compare
              print(f"\n--- COMPARISON ---")
              warehance_total = float(bill_total) if bill_total else 0
              diff_our = our_total - warehance_total
              diff_float = round(csv_float_total, 2) - warehance_total
              diff_decimal = float(csv_decimal_total.quantize(Decimal('0.01'), rounding=ROUND_HALF_UP)) - warehance_total

              print(f"  Warehance total:      ${warehance_total:.2f}")
              print(f"  Our total:            ${our_total:.2f}  (diff: {diff_our:+.2f})")
              print(f"  Float CSV sum:        ${round(csv_float_total, 2):.2f}  (diff: {diff_float:+.2f})")
              print(f"  Decimal CSV sum:      ${float(csv_decimal_total.quantize(Decimal('0.01'), rounding=ROUND_HALF_UP)):.2f}  (diff: {diff_decimal:+.2f})")

              if abs(diff_our) > 0.001:
                  print(f"\n  ⚠️  DISCREPANCY DETECTED: ${diff_our:+.2f}")
                  print(f"\n--- PER-ORDER BREAKDOWN ---")
                  for row in result["report_rows"]:
                      onum = row.get("Order Number", "")
                      total = row.get("Total", 0)
                      if isinstance(total, (int, float)) and total != 0:
                          print(f"  {onum}: ${total:.2f}")
              else:
                  print(f"\n  ✅ TOTALS MATCH!")

              # Precision check
              print(f"\n--- AMOUNT PRECISION CHECK ---")
              precision_issues = []
              for i, row in enumerate(raw_rows):
                  amt_str = str(row.get("Amount", "0")).strip()
                  if "." in amt_str:
                      decimals = len(amt_str.split(".")[-1])
                      if decimals > 2:
                          precision_issues.append((i, amt_str, row.get("Charge Type Category",""), row.get("Order Number","")))

              if precision_issues:
                  print(f"  Found {len(precision_issues)} amounts with >2 decimal places:")
                  for idx, amt, cat, order in precision_issues[:20]:
                      print(f"    Row {idx}: Amount={amt}, Category={cat}, Order={order}")
              else:
                  print(f"  All amounts have ≤2 decimal places ✅")

              # Also dump ALL raw amounts for full transparency
              print(f"\n--- ALL RAW AMOUNTS ---")
              for i, row in enumerate(raw_rows):
                  print(f"  [{i}] Amount={row.get('Amount','?')}, Cat={row.get('Charge Type Category','?')}, Order={row.get('Order Number','?')}, Rule={row.get('Charge Rule Name','?')}")

              return {
                  "warehance_total": warehance_total,
                  "our_total": our_total,
                  "diff": diff_our,
                  "csv_float_total": round(csv_float_total, 2),
                  "csv_decimal_total": float(csv_decimal_total.quantize(Decimal('0.01'), rounding=ROUND_HALF_UP)),
                  "precision_issues": len(precision_issues),
                  "raw_rows": len(raw_rows),
              }

          def main():
              if not API_KEY:
                  print("ERROR: Set WAREHANCE_API_KEY environment variable")
                  sys.exit(1)

              with open("clients.json") as f:
                  data = json.load(f)

              # Test March 29 — known active day
              test_date = "2026-03-29"
              start_date = f"{test_date}T00:00:00-07:00"
              end_date = f"{test_date}T23:59:59-07:00"

              # Test a broad set of clients
              test_numbers = ["154", "257", "134", "284", "001", "111", "279", "289"]
              test_clients = [c for c in data["clients"] if c["number"] in test_numbers]

              all_results = []
              all_csvs = {}

              for client in test_clients:
                  print(f"\n{'#'*80}")
                  print(f"# Processing: {client['number']} {client['name']}")
                  print(f"{'#'*80}")

                  try:
                      bill_data = create_bill(
                          client["warehance_id"],
                          client["billing_profile_id"],
                          start_date, end_date
                      )
                      bill_id = bill_data["id"]

                      bill_full = wait_for_bill(bill_id)
                      csv_url = bill_full["line_item_details_csv_url"]

                      raw_rows, raw_text = download_csv(csv_url)

                      csv_filename = f"bill_csv_{client['number']}_{test_date}.csv"
                      with open(csv_filename, "w") as f:
                          f.write(raw_text)
                      print(f"Saved raw CSV to {csv_filename}")
                      all_csvs[client["number"]] = csv_filename

                      result = analyze_rounding(
                          raw_rows, bill_full,
                          client_name=client["name"],
                          client_number=client["number"],
                      )
                      result["client"] = f"{client['number']} {client['name']}"
                      all_results.append(result)

                  except Exception as e:
                      import traceback
                      print(f"ERROR: {e}")
                      traceback.print_exc()
                      all_results.append({"client": f"{client['number']} {client['name']}", "error": str(e)})

              # Final summary
              print(f"\n\n{'='*80}")
              print("FINAL SUMMARY")
              print("="*80)
              for r in all_results:
                  if "error" in r:
                      print(f"  ❌ {r['client']}: {r['error']}")
                  else:
                      status = "✅" if abs(r["diff"]) < 0.01 else "⚠️"
                      print(f"  {status} {r['client']}: WH=${r['warehance_total']:.2f} vs Ours=${r['our_total']:.2f} (diff={r['diff']:+.2f}, rows={r['raw_rows']}, precision_issues={r['precision_issues']})")

              # Save JSON results
              with open("rounding_results.json", "w") as f:
                  json.dump(all_results, f, indent=2, default=str)

          if __name__ == "__main__":
              main()
          SCRIPT
          python3 rounding_analysis.py 2>&1 | tee rounding_output.txt

      - name: Upload analysis output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rounding-analysis
          path: |
            rounding_output.txt
            rounding_results.json
            bill_csv_*.csv
