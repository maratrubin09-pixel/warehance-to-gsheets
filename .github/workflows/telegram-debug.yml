name: Telegram Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot info and recent messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== Current CHAT_ID ==="
          echo "$TELEGRAM_CHAT_ID"
          
          echo ""
          echo "=== Bot Info ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | python3 -m json.tool
          
          echo ""
          echo "=== Recent Updates ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=10" | python3 -m json.tool
          
          echo ""
          echo "=== Test Send to Current Chat ID ==="
          RESULT=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"Test message from debug workflow\"}")
          echo "$RESULT" | python3 -m json.tool
