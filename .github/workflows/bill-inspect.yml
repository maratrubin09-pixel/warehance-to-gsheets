name: Bill Inspect

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run bill inspection
        env:
          WAREHANCE_API_KEY: ${{ secrets.WAREHANCE_API_KEY }}
        run: python rounding_analysis.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rounding-results
          path: rounding_results.json
