name: Drive Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt

      - name: List and clean SA Drive files
        env:
          WAREHANCE_API_KEY: ${{ secrets.WAREHANCE_API_KEY }}
        run: |
          python3 << 'SCRIPT'
          import gspread
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build

          creds = Credentials.from_service_account_file(
              "config/service_account.json",
              scopes=["https://www.googleapis.com/auth/drive", "https://www.googleapis.com/auth/spreadsheets"]
          )

          drive = build("drive", "v3", credentials=creds)

          # Check storage quota
          about = drive.about().get(fields="storageQuota,user").execute()
          print("=== Storage Quota ===")
          q = about.get("storageQuota", {})
          print(f"  Limit: {q.get('limit', 'unlimited')}")
          print(f"  Usage: {q.get('usage', '?')}")
          print(f"  UsageInDrive: {q.get('usageInDrive', '?')}")
          print(f"  UsageInTrash: {q.get('usageInDriveTrash', '?')}")
          print(f"  User: {about.get('user', {}).get('emailAddress', '?')}")

          # List all files
          print("\n=== All Files ===")
          files = []
          page_token = None
          while True:
              resp = drive.files().list(
                  pageSize=100,
                  fields="nextPageToken, files(id, name, mimeType, size, ownedByMe, trashed)",
                  pageToken=page_token,
              ).execute()
              files.extend(resp.get("files", []))
              page_token = resp.get("nextPageToken")
              if not page_token:
                  break

          print(f"Total files: {len(files)}")
          for f in files:
              print(f"  {f['id'][:20]}... | {f.get('name','?')[:40]:40s} | {f.get('mimeType','?')[:30]:30s} | size={f.get('size','?'):>10} | trashed={f.get('trashed',False)}")

          # Empty trash first
          print("\n=== Emptying Trash ===")
          try:
              drive.files().emptyTrash().execute()
              print("  Trash emptied successfully")
          except Exception as e:
              print(f"  Error emptying trash: {e}")

          # Check quota again
          about2 = drive.about().get(fields="storageQuota").execute()
          q2 = about2.get("storageQuota", {})
          print(f"\n=== After Cleanup ===")
          print(f"  Usage: {q2.get('usage', '?')}")
          print(f"  UsageInDrive: {q2.get('usageInDrive', '?')}")
          print(f"  UsageInTrash: {q2.get('usageInDriveTrash', '?')}")
          SCRIPT
